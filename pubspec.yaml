name: cuj
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5
  google_maps_flutter: ^2.6.0
  syncfusion_flutter_pdfviewer: ^32.2.5
  flutter_pdfview: ^1.3.2
  android_intent_plus: ^5.3.1
  geolocator: ^10.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/CU_JAMMU-removebg-preview.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/CU_JAMMU-removebg-preview.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pdfs/
